<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>My World — 散步</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<!-- Self-hosted, subsetted fonts. Google Fonts is blocked in mainland China,
     which left users there with mismatched system fallbacks. Regenerate with
     `node scripts/build-fonts.mjs` after changing on-screen text. -->
<link rel="stylesheet" href="/fonts/fonts.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
    <filter id="wobble-strong">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5"/>
    </filter>
  </defs>
</svg>

<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>

</body>
</html>
